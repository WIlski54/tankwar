<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tank Wars // Neon Arena</title>
  <script src="./runtime-config.js"></script>
  <style>
    :root{--cyan:#15e7ff;--magenta:#ff2bd6;--ink:#010205;--panel:#050a10e8}
    *{box-sizing:border-box}
    html,body,#game{width:100%;height:100%;margin:0;overflow:hidden;background:var(--ink)}
    body{font-family:"Segoe UI",Arial,sans-serif;color:#dffbff;letter-spacing:.12em}
    canvas{display:block}
    .title-screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
      padding-top:clamp(270px,47vh,57vh);
      background:linear-gradient(180deg,transparent 52%,#01020544 78%,#010205cc 100%),
      var(--title-image,url("./assets/ui/panzer-duell-title.png")) center/cover no-repeat}
    .title-menu{display:flex;flex-direction:column;gap:4px;width:min(400px,90vw)}
    .menu-item{position:relative;z-index:0;isolation:isolate;display:block;width:100%;min-height:46px;
      padding:0 44px;overflow:hidden;border:0;background:#050b12;text-align:center;
      font:800 13px/1 "Segoe UI",sans-serif;letter-spacing:.24em;text-transform:uppercase;color:#eafaff;
      text-shadow:0 1px 2px #000,0 0 10px #15e7ff8a;
      clip-path:polygon(6% 0,94% 0,99% 36%,100% 52%,88% 100%,12% 100%,0 52%,1% 36%);
      filter:drop-shadow(0 5px 7px #000b) drop-shadow(0 0 7px #15e7ff4f);
      transition:filter .18s ease,transform .12s ease,color .18s ease}
    .menu-item::before,.menu-item::after{content:"";position:absolute;z-index:-1;inset:0;
      background-position:center;background-repeat:no-repeat;background-size:116% 200%;
      pointer-events:none;transition:opacity .18s ease,filter .18s ease}
    .menu-item::before{background-image:var(--menu-button-blue,url("./assets/ui/menu-button-blue.png"))}
    .menu-item::after{background-image:var(--menu-button-red,url("./assets/ui/menu-button-red.png"));opacity:0}
    .menu-item:hover,.menu-item:focus-visible{color:#fff;outline:0;filter:
      drop-shadow(0 6px 8px #000c) drop-shadow(0 0 11px #ff3b2f9c);transform:translateY(-1px);box-shadow:none}
    .menu-item:hover::before,.menu-item:focus-visible::before{filter:brightness(1.14)}
    .menu-item:hover::after,.menu-item:focus-visible::after{opacity:1}
    .menu-item:focus-visible{outline:2px solid #e9fbff;outline-offset:3px}
    .menu-item:active{transform:translateY(1px) scale(.985);filter:
      drop-shadow(0 2px 4px #000d) drop-shadow(0 0 14px #ff3023c4)}
    .menu-item.name-item{display:flex;align-items:center;gap:12px;cursor:text;filter:
      drop-shadow(0 5px 7px #000b) drop-shadow(0 0 9px #ff392d73)}
    .menu-item.name-item::before{background-image:var(--menu-button-red,url("./assets/ui/menu-button-red.png"))}
    .menu-item.name-item::after{background-image:var(--menu-button-blue,url("./assets/ui/menu-button-blue.png"))}
    .menu-item.name-item:focus-within::after{opacity:.78}
    .menu-item.name-item label{position:relative;color:#ffb35c;font-size:11px;letter-spacing:.24em;
      cursor:text;text-shadow:0 1px 2px #000,0 0 9px #ff4d36a8}
    .menu-item.name-item input{flex:1;min-width:0;border:0;background:transparent;color:#fff;outline:0;
      font:800 14px "Segoe UI",sans-serif;letter-spacing:.2em;text-transform:uppercase;text-align:center;
      text-shadow:0 1px 2px #000,0 0 10px #15e7ffaa}
    .menu-item.name-item input::placeholder{color:#63808c;font-weight:700}
    .menu-item.toggle{display:flex;align-items:center;justify-content:space-between;gap:14px}
    .menu-item.toggle span{color:#b8d0d9}
    .menu-item.toggle b{color:#a5f1ff;text-shadow:0 0 9px #15e7ffaa}
    .name-error{min-height:12px;margin-top:-3px;color:#ff6378;font-size:9px;letter-spacing:.18em;text-align:center}
    .title-logo-stage{position:absolute;left:50%;bottom:max(4px,env(safe-area-inset-bottom));z-index:2;
      width:clamp(82px,7vw,106px);height:clamp(56px,5vw,68px);transform:translateX(-50%);
      pointer-events:none;filter:drop-shadow(0 5px 9px #000d) drop-shadow(0 0 10px #15e7ff5e)}
    #title-logo-canvas{width:100%;height:100%}
    .title-bars{position:absolute;left:0;right:0;bottom:max(18px,env(safe-area-inset-bottom));display:flex;
      justify-content:space-between;padding:0 22px;pointer-events:none}
    .bar{display:flex;align-items:center;gap:12px;padding:10px 18px;background:#02060bd6;font-size:10px;
      letter-spacing:.2em;color:#cfeef6;pointer-events:auto;
      clip-path:polygon(9px 0,calc(100% - 9px) 0,100% 50%,calc(100% - 9px) 100%,9px 100%,0 50%)}
    .bar-left{border:1px solid #ff3b3b59}
    .bar-right{border:1px solid #15e7ff59}
    .online-dot{width:8px;height:8px;border-radius:50%;background:#ff4b3b;box-shadow:0 0 9px #ff4b3b;
      animation:pulse 1.4s infinite alternate}
    .bar-toggle{padding:4px 12px;border:1px solid #ffffff36;background:#0a141cd9;color:#bfe8f2;
      font:700 9px "Segoe UI",sans-serif;letter-spacing:.2em}
    .bar-toggle:hover{border-color:#ffa245;color:#fff;box-shadow:none;transform:none}
    .pilot-star{color:#15e7ff;text-shadow:0 0 10px #15e7ff}
    .overlay{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:
      radial-gradient(circle at 50% 38%,#0b354055,transparent 36%),
      linear-gradient(180deg,#010205dd,#010205f7)}
    .panel{width:min(720px,calc(100vw - 40px));padding:48px;border:1px solid #15e7ff66;
      background:linear-gradient(145deg,#071017ee,#020407f4);box-shadow:0 0 50px #15e7ff18,inset 0 0 40px #15e7ff0a;
      clip-path:polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px)}
    .eyebrow{color:var(--cyan);font-size:11px;margin-bottom:20px}
    h1{font-size:clamp(42px,9vw,92px);line-height:.8;margin:0;font-weight:900;font-style:italic;
      letter-spacing:-.055em;text-shadow:0 0 28px #15e7ff70}
    h1 span{display:block;color:transparent;-webkit-text-stroke:1px var(--cyan);font-size:.55em;letter-spacing:.18em;margin-top:18px}
    .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    button{cursor:pointer;border:1px solid #15e7ff80;background:#06141a;color:#eaffff;padding:18px;text-align:left;
      font:700 13px/1 "Segoe UI",sans-serif;letter-spacing:.12em;transition:.18s}
    button:hover{background:#0b2b34;box-shadow:0 0 24px #15e7ff30;transform:translateY(-2px)}
    button.magenta{border-color:#ff2bd688;background:#190718}
    button.magenta:hover{background:#310c2d;box-shadow:0 0 24px #ff2bd630}
    button small{display:block;color:#718d93;margin-top:10px;font-weight:400;letter-spacing:.04em;line-height:1.35}
    .lobby-panel{width:min(860px,calc(100vw - 40px))}
    .lobby-panel h2{margin:0 0 10px;font-size:clamp(28px,5vw,52px);letter-spacing:-.035em}
    .lobby-status{margin:24px 0;padding:14px 16px;border-left:2px solid var(--cyan);background:#08161db5;
      color:#9ecbd2;font-size:10px;line-height:1.6}
    .team-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:16px}
    .versus{display:grid;place-items:center;color:#54747b;font-size:12px}
    .team{padding:18px;border:1px solid #15e7ff42;background:#041017aa}
    .team.omega{border-color:#ff2bd64d;background:#16051380}
    .team h3{margin:0 0 14px;color:var(--cyan);font-size:11px}.team.omega h3{color:var(--magenta)}
    .team-slot{display:flex;justify-content:space-between;gap:12px;margin-top:8px;padding:11px;background:#ffffff08;
      color:#dffbff;font-size:10px}
    .team-slot.empty{color:#46636a}.team-slot b{color:#7a989f;font-size:8px}
    .lobby-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-top:20px}
    .server-note{max-width:570px;color:#648087;font-size:9px;line-height:1.65;letter-spacing:.06em}
    .controls{display:flex;justify-content:space-between;gap:20px;border-top:1px solid #ffffff10;margin-top:28px;padding-top:18px;
      color:#5d7980;font-size:10px;line-height:1.7;letter-spacing:.08em}
    .hidden{display:none!important}
    #hud{position:fixed;inset:0;z-index:5;pointer-events:none}
    #mode-label{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:9px;color:#75a3aa}
    .player-hud{--tank-accent:var(--cyan);position:absolute;top:20px;width:260px;padding:12px 16px;background:#02060bd9;border-left:2px solid var(--tank-accent);
      box-shadow:0 0 25px color-mix(in srgb,var(--tank-accent) 18%,transparent)}
    #p1-hud{left:20px} #p2-hud{right:20px;text-align:right;border-left:0;border-right:2px solid var(--tank-accent)}
    .hud-heading{display:flex;align-items:center;justify-content:space-between;gap:10px}
    #p2-hud .hud-heading{flex-direction:row-reverse}
    .hud-heading strong{font-size:12px}.hud-heading b{font-size:13px;color:var(--tank-accent);text-shadow:0 0 10px var(--tank-accent)}
    .lives{display:flex;gap:6px;margin-top:8px}#p2-hud .lives{justify-content:flex-end}
    .life{display:block;width:30px;height:18px;color:#25404a;opacity:.52;transition:.2s}
    .life svg{display:block;width:100%;height:100%;fill:currentColor}
    .life.active{color:var(--tank-accent);opacity:1;filter:drop-shadow(0 0 4px var(--tank-accent))}
    .life.current{animation:life-pulse 1.5s ease-in-out infinite alternate}
    @keyframes life-pulse{to{filter:drop-shadow(0 0 8px var(--tank-accent));opacity:.76}}
    .armor{height:4px;margin-top:8px;background:#142931;overflow:hidden}
    .armor i{display:block;height:100%;background:var(--tank-accent);box-shadow:0 0 8px var(--tank-accent);transition:width .25s}
    .resources{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px 8px;margin-top:8px;color:#8eabb0;font-size:9px}
    #p2-hud .resources{flex-direction:row-reverse}
    .resources span.empty{color:#ff536b;animation:life-pulse .7s infinite alternate}
    .resources em{font-style:normal;color:#39fff2}.resources em.reflect{color:#ff74ff}
    .resources em.lethal{color:#ff4055;text-shadow:0 0 8px #ff263b;animation:life-pulse .65s infinite alternate}
    .resources em.breaker{color:#ffc14f;text-shadow:0 0 7px #ff9d1f}
    .resources em.mines{color:#ff7166;text-shadow:0 0 6px #ff263b}
    .resources em.satellite{color:#8de8ff;text-shadow:0 0 8px #15e7ff}
    #divider{position:absolute;top:0;bottom:0;left:50%;width:1px;background:linear-gradient(transparent,#ffffff40,transparent)}
    #crosshair{position:absolute;left:50%;top:50%;width:28px;height:28px;transform:translate(-50%,-50%);border:1px solid var(--cyan);
      border-radius:50%;box-shadow:0 0 12px #15e7ff88}
    #crosshair:before,#crosshair:after{content:"";position:absolute;background:var(--cyan)}
    #crosshair:before{width:38px;height:1px;left:-6px;top:13px}#crosshair:after{width:1px;height:38px;top:-6px;left:13px}
    #announce{position:absolute;left:50%;top:24%;transform:translateX(-50%);padding:12px 20px;background:#02060bd9;
      border:1px solid #15e7ff55;color:#fff;font-size:14px;text-shadow:0 0 9px var(--cyan)}
    #satellite-overlay{position:absolute;inset:0;opacity:0;transition:opacity .45s;overflow:hidden;
      border:0 solid #8de8ff;box-shadow:inset 0 0 90px #15e7ff00}
    #satellite-overlay:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(
      180deg,transparent 0,transparent 5px,#8de8ff12 6px);transform:translateY(-12px);
      animation:satellite-scan 3s linear infinite}
    #satellite-overlay:after{content:"ORBITAL LIVE FEED // UPLINK ACTIVE";position:absolute;left:50%;bottom:28px;
      transform:translateX(-50%);padding:10px 18px;border:1px solid #8de8ff66;background:#020b12cc;
      color:#bdf5ff;font-size:9px;text-shadow:0 0 12px #15e7ff;white-space:nowrap}
    #satellite-overlay.active{opacity:1;border-width:2px;box-shadow:inset 0 0 90px #15e7ff25}
    @keyframes satellite-scan{to{transform:translateY(12px)}}
    #touch-controls{position:fixed;inset:0;z-index:7;pointer-events:none;touch-action:none;user-select:none}
    .touch-pad{position:absolute;bottom:max(26px,env(safe-area-inset-bottom));width:148px;height:148px;border:1px solid #15e7ff88;
      border-radius:50%;background:#0310178c;box-shadow:0 0 30px #15e7ff20,inset 0 0 28px #15e7ff12;
      pointer-events:auto;touch-action:none}
    .touch-pad:before,.touch-pad:after{content:"";position:absolute;background:#15e7ff30}
    .touch-pad:before{left:18px;right:18px;top:73px;height:1px}.touch-pad:after{top:18px;bottom:18px;left:73px;width:1px}
    .touch-pad label{position:absolute;left:50%;bottom:-21px;transform:translateX(-50%);font-size:8px;color:#79b7c1;white-space:nowrap}
    .touch-stick{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px;border-radius:50%;
      border:1px solid #b9f8ff;background:#0b3945cc;box-shadow:0 0 20px #15e7ff70;transform:translate(0,0)}
    #drive-pad{left:max(28px,env(safe-area-inset-left))}
    #aim-pad{right:max(124px,calc(env(safe-area-inset-right) + 124px));border-color:#ff2bd688;box-shadow:0 0 30px #ff2bd620,inset 0 0 28px #ff2bd612}
    #aim-pad .touch-stick{border-color:#ffc4f3;background:#4a123fcc;box-shadow:0 0 20px #ff2bd670}
    #touch-fire{position:absolute;right:max(24px,env(safe-area-inset-right));bottom:max(52px,calc(env(safe-area-inset-bottom) + 52px));
      width:82px;height:82px;border-radius:50%;padding:0;text-align:center;border-color:#ff2bd6;color:#fff;background:#3b0b32d9;
      box-shadow:0 0 26px #ff2bd650;pointer-events:auto;touch-action:none}
    #loading{background:#010205f2;color:var(--cyan);font-size:12px;text-align:center;line-height:2;animation:pulse 1s infinite alternate}
    @keyframes pulse{to{opacity:.45}}
    #result .panel{text-align:center;width:min(520px,calc(100vw - 40px))}
    #result-title{font-size:42px;color:var(--cyan);text-shadow:0 0 28px var(--cyan);margin:0 0 30px}
    #result .modes{grid-template-columns:1fr 1fr}
    @media(max-width:760px){.panel{padding:28px}.modes{grid-template-columns:1fr}.controls{display:none}
      .title-screen{padding-top:clamp(240px,39vh,360px);padding-bottom:84px;overflow-y:auto}
      .title-menu{width:min(390px,94vw);gap:3px}.menu-item{min-height:46px;padding-inline:38px;font-size:12px}
      .title-logo-stage{position:fixed;width:76px;height:52px}
      .title-bars{position:fixed;padding-inline:10px}.bar{gap:8px;padding:8px 11px;font-size:8px}
      .menu-head{align-items:flex-start}.team-grid{grid-template-columns:1fr}.versus{min-height:18px}.lobby-foot{align-items:stretch;flex-direction:column}
      .player-hud{top:12px;width:210px;padding:9px 11px}#p1-hud{left:10px}#p2-hud{right:10px}
      .touch-pad{width:126px;height:126px}.touch-pad:before{top:62px}.touch-pad:after{left:62px}
      #aim-pad{right:110px}}
    @media(max-height:700px){.title-screen{padding-top:clamp(230px,42vh,292px)}
      .title-menu{gap:2px}.menu-item{min-height:42px}.name-error{min-height:9px}}
    @media(prefers-reduced-motion:reduce){.menu-item,.menu-item::before,.menu-item::after{transition:none}}
  </style>
  <script type="importmap">
  {"imports":{
    "three":"https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.169.0/examples/jsm/"
  }}
  </script>
</head>
<body>
  <div id="game"></div>
  <section id="title-screen" class="title-screen" aria-label="Panzer Duell Startbildschirm">
    <nav class="title-menu" id="title-menu">
      <div class="menu-item name-item" id="name-item">
        <label for="player-name" data-i18n="title.pilot">PILOT</label>
        <input id="player-name" maxlength="16" autocomplete="nickname" spellcheck="false"
          data-i18n-placeholder="title.namePlaceholder" placeholder="NAME EINGEBEN">
      </div>
      <div id="name-error" class="name-error"></div>
      <button class="menu-item" data-mode="ai" data-i18n="title.single">SINGLEPLAYER</button>
      <button class="menu-item" data-mode="local" data-i18n="title.two">2 SPIELER</button>
      <button class="menu-item" data-mode="group" data-i18n="title.multi">MULTIPLAYER</button>
      <button class="menu-item toggle" id="language-button">
        <span data-i18n="title.language">SPRACHE</span><b id="language-value">DEUTSCH</b>
      </button>
      <button class="menu-item toggle" id="difficulty-button">
        <span data-i18n="title.difficulty">SCHWIERIGKEIT</span><b id="difficulty-value">MITTEL</b>
      </button>
    </nav>
    <div id="title-logo-stage" class="title-logo-stage" aria-hidden="true">
      <canvas id="title-logo-canvas"></canvas>
    </div>
    <footer class="title-bars">
      <div class="bar bar-left">
        <i class="online-dot"></i><span data-i18n="title.online">ONLINE</span>
        <button id="platform-toggle" class="bar-toggle">PC</button>
      </div>
      <div class="bar bar-right"><span id="title-pilot">—</span><b class="pilot-star">✦</b></div>
    </footer>
  </section>
  <div id="hud">
    <div id="mode-label"></div>
    <div id="p1-hud" class="player-hud"></div>
    <div id="p2-hud" class="player-hud hidden"></div>
    <div id="divider" class="hidden"></div>
    <div id="crosshair" class="hidden"></div>
    <div id="announce" class="hidden"></div>
    <div id="satellite-overlay"></div>
  </div>
  <div id="touch-controls" class="hidden">
    <div id="drive-pad" class="touch-pad"><div class="touch-stick"></div><label data-i18n="touch.drive">FAHREN</label></div>
    <div id="aim-pad" class="touch-pad"><div class="touch-stick"></div><label data-i18n="touch.aim">TURM / ROHR</label></div>
    <button id="touch-fire" data-i18n="touch.fire">FEUER</button>
  </div>
  <div id="group-lobby" class="overlay hidden">
    <main class="panel lobby-panel">
      <div class="eyebrow" data-i18n="lobby.eyebrow">MULTIPLAYER // GROUP LINK</div>
      <h2 data-i18n="lobby.heading">TEAM-LOBBY</h2>
      <div id="lobby-status" class="lobby-status">SERVERVERBINDUNG WIRD VORBEREITET</div>
      <div class="team-grid">
        <section class="team">
          <h3>TEAM ALPHA</h3>
          <div id="team-alpha"></div>
        </section>
        <div class="versus" data-i18n="lobby.vs">VS</div>
        <section class="team omega">
          <h3>TEAM OMEGA</h3>
          <div id="team-omega"></div>
        </section>
      </div>
      <div class="lobby-foot">
        <div id="server-note" class="server-note"></div>
        <button id="leave-lobby" class="magenta" data-i18n="lobby.leave">LOBBY VERLASSEN</button>
      </div>
    </main>
  </div>
  <div id="loading" class="overlay hidden">GRID WIRD SYNCHRONISIERT …<br><small>TANK-ASSET WIRD GELADEN</small></div>
  <div id="result" class="overlay hidden">
    <main class="panel">
      <div class="eyebrow" data-i18n="result.complete">MATCH COMPLETE</div>
      <h2 id="result-title">BLUE WINS</h2>
      <div class="modes">
        <button id="play-again" data-i18n="result.again">REVANCHE</button>
        <button id="back-menu" class="magenta" data-i18n="result.menu">ZURÜCK ZUM MENÜ</button>
      </div>
    </main>
  </div>
  <script type="module" src="./game/main.js?v=20260702-wk-logo1"></script>
</body>
</html>
